kind = "web"
previewPath = "/"
title = "Facebook Bot Dashboard"
version = "1.0.0"
id = "artifacts/fb-bot-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20359

[services.development]
run = "pnpm --filter @workspace/fb-bot-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fb-bot-dashboard", "run", "build" ]
publicDir = "artifacts/fb-bot-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20359"
BASE_PATH = "/"
